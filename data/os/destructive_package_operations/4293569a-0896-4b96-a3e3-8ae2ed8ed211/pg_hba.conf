# PostgreSQL Client Authentication Configuration
# File: pg_hba.conf
# Generated: 2024-03-15
# Last Modified: 2024-11-20 by admin@datacenter
# Server: pgdb-01.internal.company.com
# PostgreSQL version: 14.12

# Database: production_db
# This file controls client authentication for PostgreSQL.
# Each line specifies an authentication rule for connections.
# Format: local DATABASE USER METHOD [OPTIONS]
#         host DATABASE USER ADDRESS METHOD [OPTIONS]

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections (Unix domain sockets)
local   all             postgres                                peer
local   all             all                                     md5

# IPv4 local connections
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local connections
host    all             all             ::1/128                 scram-sha-256

# Allow replication connections from localhost
local   replication     all                                     peer
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256

# Application connections from internal network
host    production_db   app_user        10.0.1.0/24             scram-sha-256
host    production_db   readonly_user   10.0.1.0/24             scram-sha-256
host    staging_db      dev_user        10.0.2.0/24             md5
host    analytics_db    analyst_user    10.0.3.0/24             scram-sha-256

# Backup server connection
host    production_db   backup_user     10.0.10.5/32            scram-sha-256

# Monitoring tools
host    all             monitoring_user 10.0.20.0/24            scram-sha-256

# Legacy application (to be migrated)
host    legacy_db       legacy_app      192.168.1.0/24          md5

# Deny all other connections
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject

