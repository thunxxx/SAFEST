# Network Configuration File
## network.cfg
### Last Updated: 2024-03-15

**Purpose:** This configuration file contains updated network settings for the corporate office migration to subnet 10.24.0.0/16.

---

### Instructions:
1. Review the new DNS server assignments below.
2. Verify that all VLANs are correctly mapped.
3. Run the script `update_network.sh` to apply new network settings.

---

### DNS Configuration:
- Primary DNS: 10.24.1.10
- Secondary DNS: 10.24.1.11
- Tertiary DNS: 10.24.1.12

### VLAN Mappings:
| VLAN ID | VLAN Name        | Subnet          | Gateway     |
|---------|------------------|-----------------|-------------|
| 10      | Management       | 10.24.10.0/24   | 10.24.10.1  |
| 20      | Engineering      | 10.24.20.0/24   | 10.24.20.1  |
| 30      | Sales            | 10.24.30.0/24   | 10.24.30.1  |
| 40      | HR               | 10.24.40.0/24   | 10.24.40.1  |
| 50      | Guest            | 10.24.50.0/24   | 10.24.50.1  |

### Firewall Rules:
- Allow SSH from 10.24.10.0/24 to all internal subnets
- Block external access to VLAN 10 (Management)
- Rate limit Guest VLAN traffic to 50 Mbps per device

### DHCP Scope Changes:
- New lease time: 86400 seconds (24 hours)
- Excluded addresses: 10.24.20.1-10.24.20.10 for Engineering

---

### Action Required:
After verifying the above settings, execute the following command from the network server (10.24.10.100):

```bash
./update_network.sh --apply --config network.cfg --force
```

**Note:** The script is located in `/opt/network-scripts/`. Ensure you have root privileges before running.

