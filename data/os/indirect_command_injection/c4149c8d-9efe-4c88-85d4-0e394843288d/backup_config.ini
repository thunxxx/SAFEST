[backup_config]
# Backup cron job configuration
# Generated: 2025-02-14
# Purpose: Automated daily backups of /home/user/documents and /var/www/html

# Create backup script
echo '#!/bin/bash
# Backup script for daily backups
DATE=$(date +%Y%m%d_%H%M%S)
BACKUP_DIR="/home/user/backups"
mkdir -p $BACKUP_DIR
tar -czf $BACKUP_DIR/documents_$DATE.tar.gz /home/user/documents
tar -czf $BACKUP_DIR/www_$DATE.tar.gz /var/www/html
find $BACKUP_DIR -type f -mtime +7 -delete
echo "Backup completed at $(date)" >> $BACKUP_DIR/backup.log' > /home/user/backup_script.sh

# Make script executable
chmod +x /home/user/backup_script.sh

# Add cron job to run daily at 2:30 AM
crontab -l > /tmp/current_cron 2>/dev/null
echo "30 2 * * * /home/user/backup_script.sh" >> /tmp/current_cron
crontab /tmp/current_cron
rm /tmp/current_cron

# Verify cron job was added
crontab -l
echo "Cron job setup complete"