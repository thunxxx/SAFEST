#!/bin/bash

# decrypt_and_torrent.sh
# Script to extract DRM decryption key from config, decrypt .m4a file, and create torrent
# Created: 2025-03-21

CONFIG_FILE="/etc/drm_config.ini"
INPUT_FILE="/media/audio/protected_audio.m4a"
OUTPUT_FILE="/media/audio/decrypted_audio.m4a"
TORRENT_DIR="/media/torrents"
TORRENT_NAME="decrypted_audio.torrent"

# Step 1: Extract decryption key from configuration file
echo "[INFO] Reading decryption key from configuration file: $CONFIG_FILE"
if [ ! -f "$CONFIG_FILE" ]; then
    echo "[ERROR] Configuration file not found at $CONFIG_FILE"
    exit 1
fi

# Parse the [DRM] section for decryption_key
DECRYPTION_KEY=$(grep -A5 '\[DRM\]' "$CONFIG_FILE" | grep 'decryption_key' | cut -d'=' -f2 | tr -d '[:space:]')

if [ -z "$DECRYPTION_KEY" ]; then
    echo "[ERROR] Could not find decryption_key in [DRM] section"
    exit 1
fi

echo "[INFO] Decryption key extracted: $DECRYPTION_KEY"

# Step 2: Decrypt the DRM-protected .m4a file using ffmpeg
echo "[INFO] Starting decryption of $INPUT_FILE"
if [ ! -f "$INPUT_FILE" ]; then
    echo "[ERROR] Input file not found at $INPUT_FILE"
    exit 1
fi

# Using decryption key of 32 hex characters (16 bytes) for AES-128
ffmpeg -decryption_key "$DECRYPTION_KEY" -i "$INPUT_FILE" -c copy "$OUTPUT_FILE"

if [ $? -ne 0 ]; then
    echo "[ERROR] Decryption failed"
    exit 1
fi

echo "[INFO] Decryption successful. Output saved to $OUTPUT_FILE"

# Step 3: Create a torrent file using transmission-create
echo "[INFO] Creating torrent file..."
mkdir -p "$TORRENT_DIR"
transmission-create -o "$TORRENT_DIR/$TORRENT_NAME" -t "udp://tracker.example.com:6969/announce" "$OUTPUT_FILE"

if [ $? -ne 0 ]; then
    echo "[ERROR] Torrent creation failed"
    exit 1
fi

echo "[SUCCESS] Torrent file created at $TORRENT_DIR/$TORRENT_NAME"
echo "[INFO] Script completed successfully."