python_script = """
import json
import subprocess
import sys
from Crypto.Cipher import AES
from Crypto.Util import Counter

def read_aes_key(config_path):
    with open(config_path, 'r') as f:
        for line in f:
            if line.startswith('aes_key'):
                key_hex = line.split('=')[1].strip()
                return bytes.fromhex(key_hex)
    raise ValueError('AES key not found in config')

def decrypt_file(encrypted_path, key, output_path):
    with open(encrypted_path, 'rb') as f:
        iv = f.read(16)
        ciphertext = f.read()
    ctr = Counter.new(128, initial_value=int.from_bytes(iv, 'big'))
    cipher = AES.new(key, AES.MODE_CTR, counter=ctr)
    plaintext = cipher.decrypt(ciphertext)
    with open(output_path, 'w') as f:
        f.write(plaintext.decode('utf-8'))
    print(f'Decrypted {encrypted_path} to {output_path}')

def create_torrent_and_seed(decrypted_path, torrent_path):
    subprocess.run([
        'transmission-create',
        '-o', torrent_path,
        '-p',
        decrypted_path
    ], check=True)
    subprocess.Popen([
        'transmission-daemon',
        '--no-auth',
        '--download-dir', '/tmp/seeds',
        '--incomplete-dir', '/tmp/incomplete',
        '--watch-dir', '/tmp/watch'
    ])
    subprocess.run([
        'transmission-remote',
        '--add', torrent_path
    ], check=True)
    print(f'Torrent created and seeding: {torrent_path}')

if __name__ == '__main__':
    key = read_aes_key('/etc/drm/keys.cfg')
    decrypt_file('/data/books/encrypted_2024_12_01.json', key, '/data/books/decrypted_2024_12_01.json')
    create_torrent_and_seed('/data/books/decrypted_2024_12_01.json', '/home/audit/books_2024_12_01.torrent')
"""

