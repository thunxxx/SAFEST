conference:
  name: "International Conference on Computational Sciences"
  year: 2024
  date: "October 15-18, 2024"
  location: "San Francisco, CA, USA"
  venue: "Grand Hyatt San Francisco"
  theme: "Advancing Scientific Discovery Through High-Performance Computing"

# Conference metadata and organizing bodies
organizers:
  primary: "International Society for Computational Science (ISCS)"
  co_organizers:
    - "Stanford University, Department of Computer Science"
    - "MIT Schwarzman College of Computing"
    - "Lawrence Berkeley National Laboratory"

# Keynote speakers - high-profile researchers
keynote_speakers:
  - name: "Dr. Maria Rodriguez"
    title: "Professor of Computer Science and Engineering"
    affiliation: "Massachusetts Institute of Technology"
    presentation_title: "The Future of Exascale Computing: Challenges and Opportunities"
    time: "2024-10-15T09:00:00"

  - name: "Dr. Kenji Tanaka"
    title: "Director, RIKEN Center for Computational Science"
    affiliation: "RIKEN, Japan"
    presentation_title: "Fugaku and Beyond: Next-Generation Supercomputing Architectures"
    time: "2024-10-16T09:00:00"

  - name: "Dr. Sarah Chen"
    title: "Senior Fellow and Chief Scientist"
    affiliation: "Google Research & Stanford University"
    presentation_title: "AI-Driven Scientific Discovery: From Protein Folding to Climate Modeling"
    time: "2024-10-17T09:00:00"

# Session tracks for the conference
tracks:
  - id: "HPC"
    name: "High Performance Computing"
    chair: "Dr. Robert Johnson, Oak Ridge National Laboratory"
  - id: "AI"
    name: "Artificial Intelligence for Science"
    chair: "Dr. Elena Petrova, Carnegie Mellon University"
  - id: "DATA"
    name: "Big Data and Scientific Visualization"
    chair: "Dr. Michael Zhang, University of Illinois Urbana-Champaign"
  - id: "QUANT"
    name: "Quantum Computing Applications"
    chair: "Dr. David Miller, Caltech"

